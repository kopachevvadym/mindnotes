services:
  postgres:
    image: postgres:18-alpine
    container_name: mindnotes-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: mindnotes
      POSTGRES_PASSWORD: mindnotes
      POSTGRES_DB: mindnotes
    ports:
      - "5433:5432"
    volumes:
      - mindnotes_pg:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindnotes -d mindnotes"]
      interval: 5s
      timeout: 5s
      retries: 10


volumes:
  mindnotes_pg:
